services:
  mailhog:
    container_name: mailhog
    image: mailhog/mailhog:v1.0.0
    # disable saving logs
    logging:
      driver: none
    restart: always
    env_file: .env
    environment:
      - TZ=America/Argentina/Buenos_Aires
    ports:
      # smtp server
      - ${MAILHOG_SMTP_SERVER_PORT}:1025
      # web ui
      - ${MAILHOG_WEB_PORT}:8025
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      start_period: 20s
      interval: 10s
      retries: 5
      timeout: 5s
